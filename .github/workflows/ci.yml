name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx astro check

      - name: Build
        run: npm run build

      - name: Content integrity check (07章§7・警告のみ)
        run: npm run check:content

      - name: Lighthouse CI (01章§4.3・Perf/A11y/BP/SEO 95以上)
        run: npx @lhci/cli@0.13.x autorun
