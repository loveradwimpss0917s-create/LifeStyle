name: Rewrite Suggest

on:
  schedule:
    # 毎週月曜 09:00 JST(00:00 UTC)
    - cron: '0 0 * * 1'
  workflow_dispatch:

jobs:
  suggest:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Suggest rewrite candidates (26章c25・24章L2)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node pipeline/scripts/rewrite-suggest.mjs
